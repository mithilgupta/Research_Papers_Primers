name: Publish Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        uses: quarto install tinytex --no-prompt
        
      - name: Debug TinyTeX install
        run: |
          echo "=== which pdflatex ==="
          which pdflatex || echo "pdflatex not found"
          echo "=== pdflatex version ==="
          pdflatex --version || echo "pdflatex version failed"
          echo "=== tlmgr --version ==="
          tlmgr --version || echo "tlmgr version failed"

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
